previews:
  generation: manual

services:
  - type: web
    runtime: node
    name: api-election-results
    rootDir: .
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build:backend
    startCommand: npm run start --workspace @kerala-election/backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: FRONTEND_ORIGIN
        value: https://kerala-election.onrender.com,https://results.onekeralam.in
      - key: ECI_BASE_URL
        value: https://results.eci.gov.in
      - key: ECI_CONSTITUENCY_LIST_URL
        value: https://results.eci.gov.in/ResultAcGenNov2025/statewiseS041.htm
      - key: ECI_CANDIDATE_DETAIL_URL_TEMPLATE
        value: https://results.eci.gov.in/ResultAcGenNov2025/candidateswise-S04{constituencyNumber}.htm
      - key: ECI_ELECTION_PATH
        value: ""
      - key: ECI_KERALA_STATE_PAGE
        value: ""
      - key: ECI_KERALA_STATE_CODE
        value: ""
      - key: CACHE_TTL_SECONDS
        value: 8
      - key: ECI_MAX_CONCURRENCY
        value: 4
      - key: ECI_REQUEST_SPACING_MS
        value: 150
      - key: ECI_BACKOFF_BASE_SECONDS
        value: 15
      - key: ECI_BACKOFF_MAX_SECONDS
        value: 90
      - key: DEFAULT_FAVORITES
        value: thrissur,ernakulam,palakkad,nemom
      - key: REQUEST_TIMEOUT_MS
        value: 12000

  - type: web
    runtime: static
    name: kerala-election
    rootDir: .
    buildCommand: npm ci && npm run build:frontend
    staticPublishPath: ./apps/frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_API_BASE_URL
        value: https://api-election-results.onrender.com
      - key: VITE_GA4_MEASUREMENT_ID
        value: ""
      - key: VITE_PUBLIC_SITE_URL
        value: https://results.onekeralam.in
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
